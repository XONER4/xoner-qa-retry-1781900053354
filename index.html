<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовый сайт — Калькулятор и Угадай число</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        @media (max-width: 700px) {
            .container { grid-template-columns: 1fr; }
        }
        .card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
        }
        .card h2 {
            font-size: 22px;
            margin-bottom: 20px;
            text-align: center;
            color: #a78bfa;
        }
        .card input, .card select {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }
        .card input::placeholder { color: rgba(255,255,255,0.4); }
        .card input:focus, .card select:focus { background: rgba(255,255,255,0.18); }
        .card select option { background: #302b63; color: #fff; }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 12px;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .result-box {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 14px;
            min-height: 48px;
            margin-top: 8px;
            font-size: 18px;
            text-align: center;
            word-break: break-word;
        }
        .result-box.success { color: #4ade80; }
        .result-box.error { color: #f87171; }
        .result-box.info { color: #60a5fa; }
        .calc-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .calc-row input { flex: 1; margin-bottom: 0; }
        .calc-row select { flex: 0 0 60px; margin-bottom: 0; }
        .game-hint {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            margin-bottom: 12px;
        }
        .game-attempts {
            text-align: center;
            font-size: 14px;
            color: #fbbf24;
            margin-bottom: 8px;
        }
        .footer {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Калькулятор -->
    <div class="card">
        <h2>🧮 Калькулятор</h2>
        <div class="calc-row">
            <input type="number" id="calcNum1" placeholder="Первое число" step="any">
            <select id="calcOp">
                <option value="+">+</option>
                <option value="-">−</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            <input type="number" id="calcNum2" placeholder="Второе число" step="any">
        </div>
        <button class="btn" onclick="calculate()">= Посчитать</button>
        <div class="result-box info" id="calcResult">Введите числа и нажмите «Посчитать»</div>
    </div>

    <!-- Угадай число -->
    <div class="card">
        <h2>🎯 Угадай число</h2>
        <p class="game-hint">Я загадал число от 1 до 100. Попробуй угадать!</p>
        <input type="number" id="guessInput" placeholder="Твоё предположение" min="1" max="100">
        <button class="btn" onclick="makeGuess()">Проверить</button>
        <button class="btn" style="background: rgba(255,255,255,0.1);" onclick="resetGame()">🔄 Новая игра</button>
        <div class="game-attempts" id="attemptsDisplay">Попыток: 0</div>
        <div class="result-box info" id="gameResult">Нажми «Проверить», чтобы начать</div>
    </div>

    <div class="footer">Тестовый сайт · Калькулятор + Угадай число</div>
</div>

<script>
    // ===== Калькулятор =====
    function calculate() {
        const num1 = parseFloat(document.getElementById('calcNum1').value);
        const num2 = parseFloat(document.getElementById('calcNum2').value);
        const op = document.getElementById('calcOp').value;
        const resultBox = document.getElementById('calcResult');

        if (isNaN(num1) || isNaN(num2)) {
            resultBox.className = 'result-box error';
            resultBox.textContent = '⚠️ Введите оба числа';
            return;
        }

        let result;
        switch (op) {
            case '+': result = num1 + num2; break;
            case '-': result = num1 - num2; break;
            case '*': result = num1 * num2; break;
            case '/':
                if (num2 === 0) {
                    resultBox.className = 'result-box error';
                    resultBox.textContent = '⚠️ На ноль делить нельзя';
                    return;
                }
                result = num1 / num2;
                break;
            default:
                resultBox.className = 'result-box error';
                resultBox.textContent = '⚠️ Неизвестная операция';
                return;
        }

        resultBox.className = 'result-box success';
        resultBox.textContent = `${num1} ${op} ${num2} = ${result}`;
    }

    // ===== Угадай число =====
    let secretNumber = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;
    let gameOver = false;

    function makeGuess() {
        const input = document.getElementById('guessInput');
        const resultBox = document.getElementById('gameResult');
        const attemptsDisplay = document.getElementById('attemptsDisplay');
        const guess = parseInt(input.value);

        if (gameOver) {
            resultBox.className = 'result-box info';
            resultBox.textContent = '🔄 Игра окончена. Нажми «Новая игра»';
            return;
        }

        if (isNaN(guess) || guess < 1 || guess > 100) {
            resultBox.className = 'result-box error';
            resultBox.textContent = '⚠️ Введи число от 1 до 100';
            return;
        }

        attempts++;
        attemptsDisplay.textContent = `Попыток: ${attempts}`;

        if (guess === secretNumber) {
            resultBox.className = 'result-box success';
            resultBox.textContent = `🎉 Поздравляю! Ты угадал число ${secretNumber} за ${attempts} попыток!`;
            gameOver = true;
        } else if (guess < secretNumber) {
            resultBox.className = 'result-box info';
            resultBox.textContent = '⬆️ Загаданное число больше';
        } else {
            resultBox.className = 'result-box info';
            resultBox.textContent = '⬇️ Загаданное число меньше';
        }

        input.value = '';
        input.focus();
    }

    function resetGame() {
        secretNumber = Math.floor(Math.random() * 100) + 1;
        attempts = 0;
        gameOver = false;
        document.getElementById('attemptsDisplay').textContent = 'Попыток: 0';
        const resultBox = document.getElementById('gameResult');
        resultBox.className = 'result-box info';
        resultBox.textContent = '🔄 Новая игра! Введи число от 1 до 100';
        document.getElementById('guessInput').value = '';
        document.getElementById('guessInput').focus();
    }
</script>
</body>
</html>
