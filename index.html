<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовый сайт — Калькулятор и Угадай число</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            color: #fff;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #e0e0ff;
        }
        .calc-display {
            width: 100%;
            padding: 18px 20px;
            font-size: 28px;
            text-align: right;
            border: none;
            border-radius: 16px;
            background: rgba(0,0,0,0.4);
            color: #fff;
            margin-bottom: 16px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .calc-btn {
            padding: 18px;
            font-size: 20px;
            border: none;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        .calc-btn:hover {
            background: rgba(255,255,255,0.18);
            transform: scale(1.03);
        }
        .calc-btn:active {
            transform: scale(0.95);
        }
        .calc-btn.op {
            background: rgba(255, 165, 0, 0.25);
            color: #ffb347;
        }
        .calc-btn.op:hover {
            background: rgba(255, 165, 0, 0.4);
        }
        .calc-btn.eq {
            background: rgba(0, 200, 100, 0.3);
            color: #66ff99;
            grid-column: span 2;
        }
        .calc-btn.eq:hover {
            background: rgba(0, 200, 100, 0.5);
        }
        .calc-btn.clear {
            background: rgba(255, 60, 60, 0.2);
            color: #ff6b6b;
        }
        .calc-btn.clear:hover {
            background: rgba(255, 60, 60, 0.35);
        }
        .game-section {
            text-align: center;
        }
        .game-section p {
            color: #b0b0d0;
            margin-bottom: 16px;
            font-size: 15px;
            line-height: 1.5;
        }
        .game-input {
            width: 100%;
            padding: 14px 18px;
            font-size: 20px;
            text-align: center;
            border: none;
            border-radius: 14px;
            background: rgba(0,0,0,0.4);
            color: #fff;
            margin-bottom: 12px;
            font-family: 'Courier New', monospace;
        }
        .game-btn {
            padding: 14px 30px;
            font-size: 18px;
            border: none;
            border-radius: 14px;
            background: rgba(100, 150, 255, 0.25);
            color: #99bbff;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
            margin: 4px;
        }
        .game-btn:hover {
            background: rgba(100, 150, 255, 0.4);
            transform: scale(1.03);
        }
        .game-btn:active {
            transform: scale(0.95);
        }
        .game-btn.reset {
            background: rgba(255, 165, 0, 0.2);
            color: #ffb347;
        }
        .game-btn.reset:hover {
            background: rgba(255, 165, 0, 0.35);
        }
        .game-message {
            margin-top: 16px;
            padding: 14px;
            border-radius: 14px;
            background: rgba(0,0,0,0.3);
            font-size: 16px;
            min-height: 50px;
            color: #c0c0e0;
        }
        .game-message.win {
            background: rgba(0, 200, 100, 0.2);
            color: #66ff99;
        }
        .game-message.lose {
            background: rgba(255, 60, 60, 0.15);
            color: #ff6b6b;
        }
        .attempts {
            margin-top: 10px;
            font-size: 14px;
            color: #8888aa;
        }
        .footer {
            text-align: center;
            color: #6666aa;
            font-size: 13px;
            margin-top: 20px;
            width: 100%;
        }
        @media (max-width: 480px) {
            .card { padding: 20px; }
            .calc-btn { padding: 14px; font-size: 17px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Калькулятор -->
        <div class="card">
            <h2>🧮 Калькулятор</h2>
            <input type="text" class="calc-display" id="calcDisplay" readonly value="0">
            <div class="calc-buttons">
                <button class="calc-btn clear" onclick="clearCalc()">C</button>
                <button class="calc-btn op" onclick="appendCalc('(')">(</button>
                <button class="calc-btn op" onclick="appendCalc(')')">)</button>
                <button class="calc-btn op" onclick="appendCalc('/')">÷</button>

                <button class="calc-btn" onclick="appendCalc('7')">7</button>
                <button class="calc-btn" onclick="appendCalc('8')">8</button>
                <button class="calc-btn" onclick="appendCalc('9')">9</button>
                <button class="calc-btn op" onclick="appendCalc('*')">×</button>

                <button class="calc-btn" onclick="appendCalc('4')">4</button>
                <button class="calc-btn" onclick="appendCalc('5')">5</button>
                <button class="calc-btn" onclick="appendCalc('6')">6</button>
                <button class="calc-btn op" onclick="appendCalc('-')">−</button>

                <button class="calc-btn" onclick="appendCalc('1')">1</button>
                <button class="calc-btn" onclick="appendCalc('2')">2</button>
                <button class="calc-btn" onclick="appendCalc('3')">3</button>
                <button class="calc-btn op" onclick="appendCalc('+')">+</button>

                <button class="calc-btn" onclick="appendCalc('0')">0</button>
                <button class="calc-btn" onclick="appendCalc('.')">.</button>
                <button class="calc-btn eq" onclick="calculate()">=</button>
            </div>
        </div>

        <!-- Игра "Угадай число" -->
        <div class="card game-section">
            <h2>🎯 Угадай число</h2>
            <p>Я загадал число от 1 до 100. Попробуй угадать!</p>
            <input type="number" class="game-input" id="guessInput" placeholder="Введи число..." min="1" max="100">
            <div>
                <button class="game-btn" onclick="checkGuess()">✅ Проверить</button>
                <button class="game-btn reset" onclick="resetGame()">🔄 Новая игра</button>
            </div>
            <div class="game-message" id="gameMessage">🔮 Введи число и нажми «Проверить»</div>
            <div class="attempts" id="attemptsDisplay">Попыток: 0</div>
        </div>

        <div class="footer">Тестовый сайт · XONER AI</div>
    </div>

    <script>
        // ===== Калькулятор =====
        function appendCalc(val) {
            const display = document.getElementById('calcDisplay');
            if (display.value === '0' && val !== '.' && !'+-*/'.includes(val)) {
                display.value = val;
            } else {
                display.value += val;
            }
        }

        function clearCalc() {
            document.getElementById('calcDisplay').value = '0';
        }

        function calculate() {
            const display = document.getElementById('calcDisplay');
            try {
                let expr = display.value.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                const result = Function('"use strict"; return (' + expr + ')')();
                display.value = Number.isFinite(result) ? Math.round(result * 100000000) / 100000000 : 'Ошибка';
            } catch (e) {
                display.value = 'Ошибка';
            }
        }

        // ===== Игра "Угадай число" =====
        let secretNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        let gameOver = false;

        function checkGuess() {
            const input = document.getElementById('guessInput');
            const message = document.getElementById('gameMessage');
            const attemptsDisplay = document.getElementById('attemptsDisplay');

            if (gameOver) {
                message.textContent = '🔄 Игра окончена! Нажми «Новая игра»';
                message.className = 'game-message';
                return;
            }

            const guess = parseInt(input.value, 10);

            if (isNaN(guess) || guess < 1 || guess > 100) {
                message.textContent = '⚠️ Введи число от 1 до 100';
                message.className = 'game-message';
                return;
            }

            attempts++;
            attemptsDisplay.textContent = 'Попыток: ' + attempts;

            if (guess === secretNumber) {
                message.textContent = '🎉 Поздравляю! Ты угадал число ' + secretNumber + ' за ' + attempts + ' попыток!';
                message.className = 'game-message win';
                gameOver = true;
            } else if (guess < secretNumber) {
                message.textContent = '📈 Загаданное число больше. Попробуй ещё!';
                message.className = 'game-message';
            } else {
                message.textContent = '📉 Загаданное число меньше. Попробуй ещё!';
                message.className = 'game-message';
            }

            input.value = '';
            input.focus();
        }

        function resetGame() {
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            gameOver = false;
            document.getElementById('guessInput').value = '';
            document.getElementById('gameMessage').textContent = '🔄 Новая игра! Число от 1 до 100 загадано.';
            document.getElementById('gameMessage').className = 'game-message';
            document.getElementById('attemptsDisplay').textContent = 'Попыток: 0';
            document.getElementById('guessInput').focus();
        }

        // Enter для игры
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('guessInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkGuess();
                }
            });
        });
    </script>
</body>
</html>
