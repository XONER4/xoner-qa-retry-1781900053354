<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестовый сайт — Калькулятор и Угадай число</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 30px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
        }
        .tab-btn.active {
            background: rgba(255,255,255,0.15);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .tab-btn:hover { background: rgba(255,255,255,0.12); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Калькулятор */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 0 auto;
        }
        .calc-display {
            grid-column: span 4;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            padding: 20px 16px;
            text-align: right;
            font-size: 32px;
            color: #fff;
            font-weight: 600;
            min-height: 70px;
            word-break: break-all;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .calc-btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        .calc-btn:active { transform: scale(0.94); }
        .calc-btn.op { background: rgba(255,165,0,0.25); color: #ffa500; }
        .calc-btn.eq { background: rgba(0,200,100,0.3); color: #00c864; grid-column: span 2; }
        .calc-btn.clr { background: rgba(255,60,60,0.2); color: #ff6b6b; }
        .calc-btn.num { background: rgba(255,255,255,0.08); }

        /* Игра */
        .game-box {
            max-width: 420px;
            margin: 0 auto;
            text-align: center;
        }
        .game-box p {
            color: rgba(255,255,255,0.7);
            margin-bottom: 15px;
            font-size: 15px;
            line-height: 1.5;
        }
        .game-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }
        .game-input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 18px;
            width: 120px;
            text-align: center;
            outline: none;
        }
        .game-input:focus { border-color: rgba(255,255,255,0.4); }
        .game-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(100,150,255,0.25);
            color: #8ab4ff;
            transition: all 0.2s;
        }
        .game-btn:hover { background: rgba(100,150,255,0.35); }
        .game-btn:active { transform: scale(0.95); }
        .game-msg {
            margin-top: 12px;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            min-height: 44px;
            color: #fff;
        }
        .game-msg.hint { background: rgba(255,255,255,0.06); }
        .game-msg.win { background: rgba(0,200,100,0.2); color: #5ddf8a; }
        .game-msg.lose { background: rgba(255,60,60,0.15); color: #ff6b6b; }
        .game-attempts {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            margin-top: 8px;
        }
        .game-restart {
            margin-top: 12px;
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.5);
            transition: all 0.2s;
        }
        .game-restart:hover { background: rgba(255,255,255,0.12); color: #fff; }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.2);
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧮 Тестовый сайт</h1>
    <div class="subtitle">Калькулятор + игра «Угадай число»</div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="calc">🧮 Калькулятор</button>
        <button class="tab-btn" data-tab="game">🎯 Угадай число</button>
    </div>

    <!-- Калькулятор -->
    <div class="tab-content active" id="tab-calc">
        <div class="calc-grid">
            <div class="calc-display" id="calcDisplay">0</div>
            <button class="calc-btn clr" data-action="clear">C</button>
            <button class="calc-btn op" data-action="op">/</button>
            <button class="calc-btn op" data-action="op">*</button>
            <button class="calc-btn op" data-action="op">-</button>
            <button class="calc-btn num" data-action="num">7</button>
            <button class="calc-btn num" data-action="num">8</button>
            <button class="calc-btn num" data-action="num">9</button>
            <button class="calc-btn op" data-action="op">+</button>
            <button class="calc-btn num" data-action="num">4</button>
            <button class="calc-btn num" data-action="num">5</button>
            <button class="calc-btn num" data-action="num">6</button>
            <button class="calc-btn num" data-action="num">1</button>
            <button class="calc-btn num" data-action="num">2</button>
            <button class="calc-btn num" data-action="num">3</button>
            <button class="calc-btn num" data-action="num">0</button>
            <button class="calc-btn num" data-action="num">.</button>
            <button class="calc-btn eq" data-action="eq">=</button>
        </div>
    </div>

    <!-- Игра -->
    <div class="tab-content" id="tab-game">
        <div class="game-box">
            <p>Я загадал число от 1 до 100. Попробуй угадать!<br>У тебя 7 попыток.</p>
            <div class="game-input-group">
                <input class="game-input" id="gameInput" type="number" min="1" max="100" placeholder="1–100">
                <button class="game-btn" id="gameGuessBtn">Проверить</button>
            </div>
            <div class="game-msg hint" id="gameMsg">Введи число и нажми «Проверить»</div>
            <div class="game-attempts" id="gameAttempts">Осталось попыток: 7</div>
            <button class="game-restart" id="gameRestart">🔄 Новая игра</button>
        </div>
    </div>

    <div class="footer">Создано AI-помощником Владислава</div>
</div>

<script>
    // ===== Вкладки =====
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    // ===== Калькулятор =====
    const display = document.getElementById('calcDisplay');
    let current = '0';
    let prev = '';
    let op = null;
    let resetNext = false;

    function updateDisplay() { display.textContent = current; }

    document.querySelectorAll('.calc-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.dataset.action;
            const val = btn.textContent;

            if (action === 'num') {
                if (resetNext) { current = ''; resetNext = false; }
                if (val === '.' && current.includes('.')) return;
                if (current === '0' && val !== '.') current = val;
                else current += val;
                updateDisplay();
            }

            if (action === 'op') {
                if (op && !resetNext) {
                    current = String(eval(prev + op + current));
                    updateDisplay();
                }
                prev = current;
                op = val;
                resetNext = true;
            }

            if (action === 'eq') {
                if (op) {
                    current = String(eval(prev + op + current));
                    updateDisplay();
                    prev = '';
                    op = null;
                    resetNext = true;
                }
            }

            if (action === 'clear') {
                current = '0';
                prev = '';
                op = null;
                resetNext = false;
                updateDisplay();
            }
        });
    });

    // ===== Игра «Угадай число» =====
    let secretNumber = Math.floor(Math.random() * 100) + 1;
    let attemptsLeft = 7;
    const gameInput = document.getElementById('gameInput');
    const gameMsg = document.getElementById('gameMsg');
    const gameAttempts = document.getElementById('gameAttempts');
    const guessBtn = document.getElementById('gameGuessBtn');
    const restartBtn = document.getElementById('gameRestart');

    function updateGameUI() {
        gameAttempts.textContent = 'Осталось попыток: ' + attemptsLeft;
    }

    function setGameMessage(text, type) {
        gameMsg.textContent = text;
        gameMsg.className = 'game-msg ' + type;
    }

    guessBtn.addEventListener('click', () => {
        const raw = gameInput.value.trim();
        if (raw === '') { setGameMessage('Введи число от 1 до 100', 'hint'); return; }
        const guess = Number(raw);
        if (!Number.isInteger(guess) || guess < 1 || guess > 100) {
            setGameMessage('Число должно быть от 1 до 100', 'hint');
            return;
        }

        if (attemptsLeft <= 0) {
            setGameMessage('Попытки закончились! Было загадано ' + secretNumber, 'lose');
            return;
        }

        attemptsLeft--;
        updateGameUI();

        if (guess === secretNumber) {
            setGameMessage('🎉 Поздравляю! Ты угадал число ' + secretNumber + '!', 'win');
            guessBtn.disabled = true;
        } else if (attemptsLeft === 0) {
            setGameMessage('😢 Попытки закончились! Я загадал ' + secretNumber, 'lose');
            guessBtn.disabled = true;
        } else if (guess < secretNumber) {
            setGameMessage('⬆️ Загаданное число больше', 'hint');
        } else {
            setGameMessage('⬇️ Загаданное число меньше', 'hint');
        }

        gameInput.value = '';
        gameInput.focus();
    });

    gameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') guessBtn.click();
    });

    restartBtn.addEventListener('click', () => {
        secretNumber = Math.floor(Math.random() * 100) + 1;
        attemptsLeft = 7;
        guessBtn.disabled = false;
        updateGameUI();
        setGameMessage('Новая игра! Введи число от 1 до 100', 'hint');
        gameInput.value = '';
        gameInput.focus();
    });
</script>
</body>
</html>
